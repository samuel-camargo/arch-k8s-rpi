apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/samuel-camargo/arch-k8s-rpi.git'
    targetRevision: HEAD
    path: apps/monitoring  # Pointing to the folder with your backup YAML
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      createNamespace: true
